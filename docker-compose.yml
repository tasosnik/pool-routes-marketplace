version: '3.8'

services:
  # PostgreSQL database with PostGIS extension
  postgres:
    image: postgis/postgis:15-3.3
    container_name: poolroute-db
    environment:
      POSTGRES_USER: poolroute
      POSTGRES_PASSWORD: development
      POSTGRES_DB: poolroute_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - poolroute-network

  # Redis for session storage and caching
  redis:
    image: redis:7-alpine
    container_name: poolroute-redis
    ports:
      - "6379:6379"
    networks:
      - poolroute-network

  # Backend API server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: poolroute-backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://poolroute:development@postgres:5432/poolroute_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: development-secret-change-in-production
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN}
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./shared:/app/shared
    depends_on:
      - postgres
      - redis
    networks:
      - poolroute-network
    command: npm run dev

  # Frontend React application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: poolroute-frontend
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3001
      VITE_MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./shared:/app/shared
    depends_on:
      - backend
    networks:
      - poolroute-network
    command: npm run dev

volumes:
  postgres_data:

networks:
  poolroute-network:
    driver: bridge